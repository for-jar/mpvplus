name: test1 Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Main arm64-v8a Unsigned APK
        # This compiles ONLY the main standard release flavor
        run: ./gradlew assembleStandardRelease

      - name: Upload Main arm64-v8a APK Only
        uses: actions/upload-artifact@v4
        with:
          name: mpvplus-main-arm64-v8a-release
          # This strictly filters the upload path to only grasp the arm64 variant
          path: app/build/outputs/apk/standard/release/*-arm64-v8a-release-unsigned.apk
          if-no-files-found: error
